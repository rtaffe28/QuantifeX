services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - backend/quantifex/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A quantifex worker --loglevel=info
    volumes:
      - ./backend:/app/backend
    env_file:
      - backend/quantifex/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
